[pytest]
testpaths =
    tests/unit
    tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto

# Minimum Python version: 3.8
minversion = 6.0

# Show extra test summary info
addopts = -v -ra --tb=short

# Markers
markers =
    asyncio: asyncio test
    unit: unit test
    integration: integration test
    slow: slow test
    network: requires network access
