[pytest]
# ────────────────────────────────────────────────────────────
# pytest 設定ファイル
# プロジェクトルート: C:\TH_Works\SBA\
#
# asyncio_mode=auto:
#   pytest-asyncio v0.21 以降では必須。
#   これがないと @pytest.mark.asyncio を付けた async テストが
#   "coroutine was never awaited" エラーになる。
# ────────────────────────────────────────────────────────────
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
